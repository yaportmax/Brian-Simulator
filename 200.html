<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brian Simulator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Courier New', Consolas, monospace;
  background: #0d0d0d;
  color: #c8c8c8;
  font-size: 13px;
  line-height: 1.4;
}
#topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 16px; border-bottom: 1px solid #333; background: #111;
  flex-wrap: wrap; gap: 6px;
}
#topbar h1 { font-size: 18px; margin: 0; letter-spacing: -0.5px; color: #e0e0e0; }
#phase-label { font-size: 13px; color: #777; font-style: italic; }
#topbar-controls { display: flex; gap: 4px; }
#topbar-controls button {
  font-size: 11px; padding: 3px 8px; border: 1px solid #444;
  background: #1a1a1a; color: #aaa; cursor: pointer; font-family: inherit;
}
#topbar-controls button:hover { background: #252525; color: #ccc; }
#main {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 6px; padding: 6px; max-width: 1400px; margin: 0 auto;
}
.panel {
  border: 1px solid #2a2a2a; padding: 10px; margin-bottom: 6px; background: #141414;
}
#panel-upgrades #upgrades-list {
  max-height: 300px; overflow-y: auto;
}
#panel-upgrades #upgrades-list::-webkit-scrollbar { width: 4px; }
#panel-upgrades #upgrades-list::-webkit-scrollbar-thumb { background: #333; }
.panel h2 {
  font-size: 13px; font-weight: bold; margin: 0 0 6px 0;
  padding-bottom: 4px; border-bottom: 1px solid #252525;
  text-transform: uppercase; letter-spacing: 0.5px; color: #888;
}
/* Action buttons */
.action-btn {
  display: block; width: 100%; padding: 5px 8px; margin: 3px 0;
  border: 1px solid #333; background: #1a1a1a; cursor: pointer;
  text-align: left; font-size: 12px; font-family: inherit;
  color: #bbb; transition: background 0.1s;
}
.action-btn:hover:not(:disabled) { background: #222; }
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.action-btn .cost { color: #666; font-size: 11px; }
.action-btn .gain { color: #5a5; font-size: 11px; }
/* Upgrade buttons */
.upgrade-btn {
  display: block; width: 100%; padding: 6px 8px; margin: 3px 0;
  border: 1px solid #2a2a3a; background: #161620; cursor: pointer;
  text-align: left; font-size: 12px; font-family: inherit; color: #aab;
  transition: all 0.15s;
}
.upgrade-btn:hover:not(:disabled):not(.purchased) { background: #1e1e2e; }
.upgrade-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.upgrade-btn.affordable { border-color: #3a6a3a; background: #1a2a1a; }
.upgrade-btn.purchased { opacity: 0.2; text-decoration: line-through; cursor: default; pointer-events: none; }
.upgrade-btn .u-cost { color: #666; font-size: 11px; }
.upgrade-btn .u-desc { color: #777; font-size: 11px; display: block; margin-top: 1px; }
/* Friend buy buttons */
.friend-btn {
  display: inline-block; padding: 4px 8px; margin: 2px 4px 2px 0;
  border: 1px solid #3a3520; background: #1a1810; cursor: pointer;
  font-size: 11px; font-family: inherit; color: #aa9;
}
.friend-btn:hover:not(:disabled) { background: #222010; }
.friend-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.friend-btn.affordable { border-color: #3a6a3a; background: #1a2a1a; }
/* Sector buttons */
.sector-btn {
  display: block; width: 100%; padding: 4px 8px; margin: 2px 0;
  border: 1px solid #333; background: #181818; cursor: pointer;
  font-size: 12px; font-family: inherit; text-align: left; color: #aaa;
}
.sector-btn:hover:not(:disabled) { background: #222; }
.sector-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.sector-btn.affordable { border-color: #3a6a3a; background: #1a2a1a; }
/* Employee buttons */
.emp-btn {
  display: block; width: 100%; padding: 4px 8px; margin: 2px 0;
  border: 1px solid #2a3333; background: #141a1a; cursor: pointer;
  font-size: 12px; font-family: inherit; text-align: left; color: #9aa;
}
.emp-btn:hover:not(:disabled) { background: #1a2222; }
.emp-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.emp-btn.affordable { border-color: #3a6a3a; background: #1a2a1a; }
/* Project buttons */
.project-choice {
  display: flex; gap: 6px; margin: 6px 0;
}
.project-btn {
  flex: 1; padding: 8px; border: 1px solid #2a2a40; background: #161622;
  cursor: pointer; font-size: 12px; font-family: inherit; text-align: left; color: #99a;
}
.project-btn:hover { background: #1e1e30; border-color: #3a3a55; }
.project-btn .p-name { font-weight: bold; display: block; color: #bbf; }
.project-btn .p-desc { color: #777; font-size: 11px; display: block; margin-top: 2px; }
.project-chosen { padding: 4px 0; font-size: 12px; color: #777; }
.project-chosen b { color: #88b; }
/* Reality project buttons */
.reality-btn {
  display: block; width: 100%; padding: 6px 8px; margin: 3px 0;
  border: 1px solid #302040; background: #1a1425; cursor: pointer;
  font-size: 12px; font-family: inherit; text-align: left; color: #a8a;
}
.reality-btn:hover:not(:disabled):not(.purchased) { background: #221830; }
.reality-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.reality-btn.purchased { opacity: 0.3; text-decoration: line-through; pointer-events: none; }
.reality-btn.affordable { border-color: #524; background: #251830; }
.reality-btn .r-cost { color: #666; font-size: 11px; }
/* Resources display */
.res-line {
  font-family: inherit;
  font-size: 13px; padding: 2px 0;
}
.res-val { font-weight: bold; color: #e0e0e0; }
.res-rate { color: #666; font-size: 11px; }
.res-label { color: #888; }
/* Energy bar */
.energy-bar-wrap {
  width: 100%; height: 8px; background: #1a1a1a; border: 1px solid #333;
  margin: 2px 0 6px 0;
}
.energy-bar-fill {
  height: 100%; transition: width 0.2s, background-color 0.3s;
}
/* Opinion bar */
.opinion-bar-wrap {
  width: 100%; height: 16px; background: #1a1a1a; border: 1px solid #444;
  position: relative; margin: 4px 0;
}
.opinion-bar-fill {
  height: 100%; transition: width 0.3s, background-color 0.3s;
}
.opinion-label {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  font-size: 11px; font-weight: bold; line-height: 16px; color: #ddd;
  text-shadow: 0 0 3px #000;
}
/* Message log */
#message-log {
  max-height: 600px; overflow-y: auto; font-size: 12px; line-height: 1.6;
}
#message-log::-webkit-scrollbar { width: 4px; }
#message-log::-webkit-scrollbar-thumb { background: #333; }
.msg { padding: 2px 0; border-bottom: 1px solid #1a1a1a; }
.msg-thought { font-style: italic; color: #888; }
.msg-event { font-weight: bold; color: #ddd; }
.msg-system { color: #555; font-size: 11px; }
.msg-project { color: #6688cc; }
.msg-board { color: #cc9944; }
.msg-cosmic { color: #aa66dd; }
.msg-ending { text-align: center; font-size: 16px; font-weight: bold; color: #e0e0e0; }
.msg-time { color: #444; font-size: 10px; margin-right: 4px; }
/* Stats */
#stats-display { font-family: inherit; font-size: 12px; color: #888; }
#stats-display div { padding: 1px 0; }
/* Phase visibility */
[data-phase-min="2"] { display: none; }
[data-phase-min="3"] { display: none; }
[data-phase-min="4"] { display: none; }
[data-phase-min="5"] { display: none; }
body.phase-2 [data-phase-min="2"],
body.phase-3 [data-phase-min="2"],
body.phase-4 [data-phase-min="2"],
body.phase-5 [data-phase-min="2"] { display: block; }
body.phase-3 [data-phase-min="3"],
body.phase-4 [data-phase-min="3"],
body.phase-5 [data-phase-min="3"] { display: block; }
body.phase-4 [data-phase-min="4"],
body.phase-5 [data-phase-min="4"] { display: block; }
body.phase-5 [data-phase-min="5"] { display: block; }
/* Conversion panel inline */
.convert-row { display: flex; gap: 4px; align-items: center; margin: 3px 0; font-size: 12px; }
.convert-btn {
  padding: 3px 8px; border: 1px solid #302040; background: #1a1425;
  cursor: pointer; font-size: 11px; font-family: inherit; color: #a8a;
}
.convert-btn:hover:not(:disabled) { background: #251830; }
.convert-btn:disabled { opacity: 0.3; cursor: not-allowed; }
/* Board meeting modal */
#board-modal {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: #181818; border: 1px solid #444; padding: 20px;
  z-index: 1000; max-width: 420px; width: 90%;
  box-shadow: 0 4px 30px rgba(0,0,0,0.6);
}
#board-modal h3 { font-size: 14px; margin-bottom: 8px; color: #cc9944; }
#board-modal p { font-size: 13px; margin-bottom: 12px; line-height: 1.5; color: #bbb; }
#board-modal .board-options { display: flex; gap: 8px; }
#board-modal .board-btn {
  flex: 1; padding: 10px; border: 1px solid #444; background: #1a1a1a;
  cursor: pointer; font-size: 12px; font-family: inherit; text-align: left; color: #bbb;
}
#board-modal .board-btn:hover { background: #252525; }
#board-modal .board-btn b { display: block; margin-bottom: 3px; color: #ddd; }
#board-modal .board-timer { font-size: 11px; color: #555; text-align: center; margin-top: 8px; }
.modal-hidden { display: none !important; }
/* Ending overlay */
#ending-overlay {
  position: fixed; inset: 0; background: rgba(10,10,10,0.97);
  z-index: 2000; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 40px;
}
#ending-overlay.modal-hidden { display: none !important; }
#ending-content { max-width: 600px; text-align: center; font-size: 16px; line-height: 2; color: #ccc; }
#ending-content .ending-line { margin: 8px 0; opacity: 0; transition: opacity 1s; }
#ending-content .ending-line.visible { opacity: 1; }
#ending-choices { margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
#ending-choices button {
  padding: 12px 24px; border: 1px solid #444; background: #1a1a1a;
  cursor: pointer; font-size: 14px; font-family: inherit; color: #ccc;
}
#ending-choices button:hover { background: #252525; }
/* Transcend button */
.transcend-btn {
  display: block; width: 100%; padding: 10px; margin: 8px 0;
  border: 1px solid #524; background: #201030; cursor: pointer;
  font-size: 14px; font-weight: bold; font-family: inherit;
  text-align: center; color: #c8a;
}
.transcend-btn:hover { background: #2a1840; }
/* Prestige button */
.prestige-btn {
  padding: 14px 28px; border: 1px solid #444; background: #1a1a1a;
  cursor: pointer; font-size: 15px; font-weight: bold; font-family: inherit;
  margin-top: 20px; color: #ccc;
}
.prestige-btn:hover { background: #252525; }
/* Responsive */
@media (max-width: 900px) {
  #main { grid-template-columns: 1fr; }
  .project-choice { flex-direction: column; }
}
/* Import/export modal */
#io-modal {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: #181818; border: 1px solid #444; padding: 20px; z-index: 1000;
  max-width: 500px; width: 90%; box-shadow: 0 4px 30px rgba(0,0,0,0.6); color: #bbb;
}
#io-modal textarea { width: 100%; height: 120px; font-size: 11px; font-family: monospace; margin: 8px 0; background: #111; color: #aaa; border: 1px solid #333; padding: 8px; }
#io-modal button { padding: 5px 12px; margin-right: 4px; cursor: pointer; font-family: inherit; background: #1a1a1a; border: 1px solid #444; color: #aaa; }
#io-modal button:hover { background: #252525; }
#io-modal.modal-hidden { display: none !important; }
/* Progress bar at very top */
#game-progress {
  position: fixed; top: 0; left: 0; width: 100%; height: 3px;
  background: #1a1a1a; z-index: 3000;
}
#game-progress-fill {
  height: 100%; width: 0%; transition: width 0.5s ease;
  background: linear-gradient(90deg, #3a6a3a, #5a5);
}
body { padding-top: 3px; }
/* Phase subtitle */
#phase-subtitle {
  font-size: 11px; color: #555; font-style: italic; font-weight: normal;
  margin-left: 8px; letter-spacing: 0.3px;
}
/* Time played in topbar */
#time-played {
  font-size: 11px; color: #555; font-family: inherit;
  margin-right: 8px; white-space: nowrap;
}
/* Panel entrance animation */
@keyframes panel-highlight {
  0% { background: #1a2018; box-shadow: 0 0 8px rgba(80,120,50,0.3); }
  100% { background: #141414; box-shadow: none; }
}
.panel-new {
  animation: panel-highlight 1.5s ease-out;
}
/* NEW badge */
.new-badge {
  display: inline-block; font-size: 9px; font-weight: bold;
  color: #5a5; background: #1a2a1a; border: 1px solid #3a5a3a;
  padding: 0 4px; margin-left: 6px; border-radius: 2px;
  letter-spacing: 0.5px; vertical-align: middle;
  animation: badge-fade 4s ease-out forwards;
}
@keyframes badge-fade {
  0% { opacity: 1; }
  70% { opacity: 1; }
  100% { opacity: 0; }
}
/* Keyboard hint */
.key-hint {
  font-size: 9px; color: #bbb; margin-left: 4px;
  font-family: 'Courier New', monospace;
}
</style>
</head>
<body class="phase-1">

    <h1>Brian Simulator <span id="phase-subtitle">just a regular guy</span></h1>

<script>
// =========================================================================
// DATA DEFINITIONS
// =========================================================================

const SUFFIXES = ['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc','UDc','DDc','TDc','QaDc'];

function fmt(n) {
  if (n === undefined || n === null || isNaN(n)) return '0';
  if (n < 0) return '-' + fmt(-n);
  if (n < 1000) return Math.floor(n).toString();
  let i = 0;
  while (n >= 1000 && i < SUFFIXES.length - 1) { n /= 1000; i++; }
  return (n < 10 ? n.toFixed(2) : n < 100 ? n.toFixed(1) : n.toFixed(0)) + SUFFIXES[i];
}

function fmtTime(s) {
  if (s < 60) return Math.floor(s) + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + Math.floor(s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

// ---- ACTIONS ----
const ACTIONS = [
  { id:'coffee', name:'Make Coffee', phase:1, energyCost:2, cpGain:1, unlockTotalCp:0, desc:'A simple cup.' },
  { id:'walk', name:'Go for a Walk', phase:1, energyCost:5, cpGain:3, unlockTotalCp:0, desc:'Fresh air.' },
  { id:'work', name:'Go to Work', phase:1, energyCost:15, cpGain:8, unlockTotalCp:0, desc:'The daily grind.' },
  { id:'talk', name:'Talk to Someone', phase:1, energyCost:8, cpGain:5, unlockTotalCp:10, desc:'Human connection.' },
  { id:'read', name:'Read a Book', phase:1, energyCost:10, cpGain:7, unlockTotalCp:15, desc:'Knowledge is power.' },
  { id:'gym', name:'Hit the Gym', phase:1, energyCost:20, cpGain:12, unlockTotalCp:25, desc:'Endorphins.' },
  { id:'cook', name:'Cook a Nice Meal', phase:1, energyCost:12, cpGain:6, unlockTotalCp:20, desc:'Culinary arts.' },
  { id:'meetup', name:'Attend a Meetup', phase:1, energyCost:25, cpGain:18, unlockTotalCp:50, desc:'Networking.' },
  // Phase 2 actions
  { id:'social_media', name:'Post on Social Media', phase:2, energyCost:10, cpGain:15, repGain:1, unlockTotalCp:100, desc:'Content creation.' },
  { id:'dinner_party', name:'Host a Dinner Party', phase:2, energyCost:30, cpGain:40, repGain:5, unlockTotalCp:200, desc:'Bring people together.' },
  { id:'networking', name:'Networking Event', phase:2, energyCost:40, cpGain:60, repGain:10, unlockTotalCp:500, desc:'Power mingling.' },
  { id:'speech', name:'Give a Speech', phase:2, energyCost:50, cpGain:100, repGain:20, unlockTotalCp:1000, desc:'Inspire the masses.' },
  { id:'festival', name:'Organize a Festival', phase:2, energyCost:80, cpGain:200, repGain:50, unlockTotalCp:2500, desc:'Legendary event.' },
];

// Deep copy of base action values for resetting after save/load
const ACTIONS_BASE = ACTIONS.map(a => ({...a}));

function resetActionsToBase() {
  for (const base of ACTIONS_BASE) {
    const action = ACTIONS.find(a => a.id === base.id);
    if (action) {
      for (const key of Object.keys(base)) {
        action[key] = base[key];
      }
    }
  }
}

// Re-apply purchased upgrade effects that modify ACTIONS data.
// Uses a no-op game proxy so only findAction() side-effects take effect,
// while game-state mutations (already saved/loaded correctly) are discarded.
function reapplyUpgradeActionEffects() {
  resetActionsToBase();
  // Recursive no-op proxy that absorbs all property reads/writes on game state
  const makeSink = () => new Proxy(function(){}, {
    get: (t, p) => (p === Symbol.toPrimitive) ? () => 0 : makeSink(),
    set: () => true,
    apply: () => makeSink()
  });
  const dummy = makeSink();
  for (const u of UPGRADES) {
    if (game.upgrades[u.id]) {
      u.effect(dummy);
    }
  }
}

// ---- UPGRADES ----
const UPGRADES = [
  // Phase 1
  { id:'p1_coffee', name:'Better Coffee Machine', cost:10, currency:'cp', phase:1, unlockFn: g=>true,
    desc:'Make Coffee gives +2 CP', effect: g=>{ findAction('coffee').cpGain += 2; } },
  { id:'p1_shoes', name:'Running Shoes', cost:15, currency:'cp', phase:1, unlockFn: g=>true,
    desc:'Walk gives +3 CP', effect: g=>{ findAction('walk').cpGain += 3; } },
  { id:'p1_energy1', name:'Multivitamins', cost:20, currency:'cp', phase:1, unlockFn: g=>true,
    desc:'+25 max energy', effect: g=>{ g.maxEnergy += 25; } },
  { id:'p1_wardrobe', name:'New Wardrobe', cost:25, currency:'cp', phase:1, unlockFn: g=>g.totalCp>=10,
    desc:'Talk gives +4 CP', effect: g=>{ findAction('talk').cpGain += 4; } },
  { id:'p1_cookbook', name:'Cookbook', cost:20, currency:'cp', phase:1, unlockFn: g=>g.totalCp>=15,
    desc:'Cook gives +4 CP', effect: g=>{ findAction('cook').cpGain += 4; } },
  { id:'p1_energy2', name:'Better Sleep Schedule', cost:35, currency:'cp', phase:1, unlockFn: g=>g.totalCp>=15,

  { id:'energy_full', cond:g=>g.energy>=g.maxEnergy && g.maxEnergy>=200 && !g.thoughtFlags.energy_full, text:"Full energy. Brian vibrates at a frequency only dogs and quantum physicists can detect.", type:'thought' },
  { id:'gym50', cond:g=>g.stats.gymClicks>=50 && !g.thoughtFlags.gym50, text:"Fifty gym sessions. Brian could benchpress his former self. Literally and metaphorically.", type:'thought' },
  { id:'alien_contact', cond:g=>g.flags.alienContact && !g.thoughtFlags.alien_contact, text:"They know Brian's name. Across the void, in languages that predate light, something whispers: Brian. Brian. Brian.", type:'cosmic' },
  { id:'all_sectors', cond:g=>Object.values(g.sectors).every(v=>v>=1) && g.phase>=3 && !g.thoughtFlags.all_sectors, text:"Every sector. Brian's hand is in everything. Entertainment, tech, food, education, philanthropy. He is the invisible architecture of daily life.", type:'event' },
  { id:'board10', cond:g=>g.stats.boardMeetings>=10 && !g.thoughtFlags.board10, text:"Ten board meetings survived. Brian has learned the art of the meaningful nod, the strategic pause, the power of saying nothing loudly.", type:'thought' },
  { id:'friends_mentors5', cond:g=>(g.friends.mentors||0)>=5 && !g.thoughtFlags.friends_mentors5, text:"Five mentors. Brian collects wise people the way some collect stamps. Each one a world. Each one a warning.", type:'thought' },
];

// =========================================================================
// GAME STATE
// =========================================================================

function getDefaultState() {
  return {
    phase: 1, tick: 0, totalTicks: 0,
    lastSave: Date.now(), lastOnline: Date.now(), startTime: Date.now(),
    // Phase 1
    cp: 0, totalCp: 0,
    energy: 100, maxEnergy: 100, energyRegen: 0.5,
    clickBonus: 0, globalCpMult: 1, clickCpMult: 1, passiveCpMult: 1,
    bonusCpPerSec: 0,
    // Phase 2
    reputation: 0, totalReputation: 0,
    friends: { acquaintances:0, close:0, best:0, mentors:0 },
    friendCostMult: { acquaintances:1, close:1, best:1, mentors:1 },
    friendProdMult: { acquaintances:1, close:1, best:1, mentors:1 },
    repMult: 1, bonusRepPerSec: 0,
    autoActions: [],
    // Phase 3
    influence: 0, totalInfluence: 0,
    publicOpinion: 50,
    sectors: { entertainment:0, technology:0, philanthropy:0, education:0, food:0 },
    sectorCostMult: 1,
    sectorSpecialCostMult: { entertainment:1, technology:1, philanthropy:1, education:1, food:1 },
    employees: { assistant:0, pr_manager:0, social_director:0, sector_manager:0, vp:0 },
    empCostMult: 1, empEffectMult: 1,
    infMult: 1,
    opinionDriftMult: 1, opinionGainMult: 1, opinionLossMult: 1,
    boardTimer: 60, boardMeetingActive: false,
    // Phase 4
    wisdom: 0, totalWisdom: 0,
    brianEssence: 0, totalEssence: 0,
    wisdomCostMult: 1, wisdomGainMult: 1,
    essenceMult: 1,
    bonusWisdomPerSec: 0,
    miniBrians: 0,
    // Meta
    upgrades: {},
    projects: {},
    realityProjects: {},
    messages: [],
    thoughtFlags: {},
    flags: { humanity: null },
    stats: { actions:0, clicks:0, gymClicks:0, totalTimePlayed:0, boardMeetings:0 },
    // Prestige
    newBrianPlus: 0, prestigeBonus: 1,
    // Auto-action timers (separate from autoActions to avoid serialization issues)
  };
}

let game = getDefaultState();

// =========================================================================
// UTILITY FUNCTIONS
// =========================================================================

function addMsg(text, type='thought') {
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  game.messages.push({ text, type, time: timeStr });
  if (game.messages.length > 200) game.messages.shift();
  renderMessages();
}

function totalFriends(g) {
  return (g.friends.acquaintances||0)+(g.friends.close||0)+(g.friends.best||0)+(g.friends.mentors||0);
}

function totalEmployees(g) {
  return Object.values(g.employees).reduce((a,b)=>a+b,0);
}

function clampOpinion() {
  if (game.flags.opinionLocked) { game.publicOpinion = 50; return; }
  game.publicOpinion = Math.max(0, Math.min(100, game.publicOpinion));
}

// =========================================================================
// GAME MECHANICS
// =========================================================================

function getCpPerSec() {
  let cps = 0;
  // Friends
  for (const ft of FRIEND_TYPES) {
    const count = game.friends[ft.id] || 0;
    const prodMult = game.friendProdMult[ft.id] || 1;
    cps += count * ft.cpPerSec * prodMult;
  }
  // Best friend bonus
  cps *= (1 + (game.friends.best || 0) * 0.05);
  // Sector bonuses
  cps *= (1 + (game.sectors.entertainment || 0) * 0.02);
  if (game.sectors.entertainment >= 25) cps *= 2;
  if (game.sectors.entertainment >= 50) cps *= 5;
  // Education sector bonus to friends
  if (game.sectors.education >= 50) cps *= 10;
  // Apply multipliers
  cps *= game.passiveCpMult * game.globalCpMult * game.prestigeBonus;
  cps += game.bonusCpPerSec * game.globalCpMult * game.prestigeBonus;
  return cps;
}

function getRepPerSec() {
  let rps = (game.totalCp / 100);
  // Mentor rep
  for (const ft of FRIEND_TYPES) {
    if (ft.repPerSec > 0) {
      rps += (game.friends[ft.id] || 0) * ft.repPerSec * (game.friendProdMult[ft.id] || 1);
    }
  }
  // Education sector
  rps *= (1 + (game.sectors.education || 0) * 0.03);
  rps *= game.repMult * game.prestigeBonus;
  rps += game.bonusRepPerSec * game.prestigeBonus;
  return rps;
}

function getInfPerSec() {
  let ips = game.reputation / 1000;
  // Opinion multiplier
  let opMult = 1;
  if (game.publicOpinion >= 80) opMult = 2;
  else if (game.publicOpinion >= 60) opMult = 1.5;
  else if (game.publicOpinion >= 40) opMult = 1;
  else if (game.publicOpinion >= 20) opMult = 0.5;
  else opMult = 0.2;
  ips *= opMult;
  // Tech sector
  ips *= (1 + (game.sectors.technology || 0) * 0.05);
  if (game.sectors.technology >= 50) ips *= 3;
  // Apply multipliers
  ips *= game.infMult * game.prestigeBonus;
  return ips;
}

function getEssencePerSec() {
  if (game.phase < 4) return 0;
  let eps = Math.pow(Math.max(0, game.wisdom), 1.5);
  eps *= game.essenceMult * game.prestigeBonus;
  return eps;
}

function getWisdomPerSec() {
  let wps = game.bonusWisdomPerSec;
  if (game.flags.miniBrians) wps += game.miniBrians * 0.5;
  wps *= game.wisdomGainMult * game.prestigeBonus;
  return wps;
}

function getFriendCost(typeId) {
  const ft = FRIEND_TYPES.find(f=>f.id===typeId);
  const count = game.friends[typeId] || 0;
  return ft.baseCost * Math.pow(ft.growth, count) * (game.friendCostMult[typeId] || 1);
}

function getSectorCost(sectorId) {
  const s = SECTORS.find(x=>x.id===sectorId);
  const lv = game.sectors[sectorId] || 0;
  return s.baseCost * Math.pow(s.growth, lv) * game.sectorCostMult * (game.sectorSpecialCostMult[sectorId] || 1);
}

function getEmployeeCost(empId) {
  const e = EMPLOYEE_TYPES.find(x=>x.id===empId);
  const count = game.employees[empId] || 0;
  return e.baseCost * Math.pow(e.costGrowth, count) * game.empCostMult;
}

function getActionCpGain(action) {
  let gain = action.cpGain + game.clickBonus;
  gain *= game.clickCpMult * game.globalCpMult * game.prestigeBonus;
  // Food sector energy cost reduction
  if (game.sectors.food >= 50) return { cp: gain, energy: 0, rep: (action.repGain || 0) * game.repMult };
  let energyCost = action.energyCost;
  if (game.sectors.food >= 25) energyCost = Math.ceil(energyCost * 0.5);
  return { cp: gain, energy: energyCost, rep: (action.repGain || 0) * game.repMult * game.prestigeBonus };
}

// =========================================================================
// ACTION HANDLERS
// =========================================================================

function performAction(actionId) {
  const action = findAction(actionId);
  if (!action) return;
  const result = getActionCpGain(action);
  if (game.energy < result.energy) return;

  game.energy -= result.energy;
  game.cp += result.cp;
  game.totalCp += result.cp;
  if (result.rep > 0) {
    game.reputation += result.rep;
    game.totalReputation += result.rep;
  }
  game.stats.actions++;
  game.stats.clicks++;
  if (actionId === 'gym') game.stats.gymClicks++;
}

function buyFriend(typeId) {
  const cost = getFriendCost(typeId);
  if (game.cp < cost) return;
  game.cp -= cost;
  game.friends[typeId]++;
}

function buySector(sectorId) {
  const cost = getSectorCost(sectorId);
  if (game.influence < cost) return;
  game.influence -= cost;
  game.sectors[sectorId]++;
  // Buying sectors fast hurts opinion
  if (!game.flags.opinionLocked) {
    game.publicOpinion -= 2 * game.opinionLossMult;
    clampOpinion();
  }
  // Check sector milestones
  checkSectorMilestones(sectorId);
}

function checkSectorMilestones(sid) {
  const lv = game.sectors[sid];
  const key = `sector_${sid}_${lv}`;
  if (game.flags[key]) return;
  // Philanthropy special
  if (sid === 'philanthropy') {
    if (lv === 10 && !game.flags.phil10) { game.flags.phil10 = true; addMsg("Philanthropy Lv10: Public opinion now drifts toward 60.", 'event'); }
    if (lv === 25 && !game.flags.phil25) { game.flags.phil25 = true; addMsg("Philanthropy Lv25: Public opinion now drifts toward 70.", 'event'); }
    if (lv === 50 && !game.flags.phil50) { game.flags.phil50 = true; addMsg("Philanthropy Lv50: Public opinion locked at 80!", 'event'); }
  }
  if (sid === 'technology') {
    if (lv === 10 && !game.flags.tech10) { game.flags.tech10 = true; addMsg("Technology Lv10: Brian AI online. Auto-actions enhanced.", 'event'); }
    if (lv === 25 && !game.flags.tech25) { game.flags.tech25 = true; addMsg("Technology Lv25: Offline progress doubled.", 'event'); }
  }
  if (sid === 'food') {
    if (lv === 10 && !game.flags.food10) { game.flags.food10 = true; game.maxEnergy *= 5; addMsg("Food Lv10: Energy capacity x5!", 'event'); }
  }
  if (sid === 'education') {
    if (lv === 10 && !game.flags.edu10) { game.flags.edu10 = true; game.friendProdMult.mentors *= 2; addMsg("Education Lv10: Mentor production doubled.", 'event'); }
  }
  if (sid === 'entertainment') {
    if (lv === 10 && !game.flags.ent10) { game.flags.ent10 = true; addMsg("Entertainment Lv10: Brian's show is a hit!", 'event'); }
  }
}

function buyEmployee(empId) {
  const emp = EMPLOYEE_TYPES.find(e=>e.id===empId);
  const cost = getEmployeeCost(empId);
  if (game.influence < cost) return;
  if (game.employees[empId] >= emp.cap) return;
  if (game.flags.soloMode) return;
  game.influence -= cost;
  game.employees[empId]++;
}

function buyUpgrade(upgradeId) {
  const u = UPGRADES.find(x=>x.id===upgradeId);
  if (!u || game.upgrades[upgradeId]) return;
  const currency = u.currency === 'influence' ? game.influence : game.cp;
  if (currency < u.cost) return;
  if (u.currency === 'influence') game.influence -= u.cost;
  else game.cp -= u.cost;
  game.upgrades[upgradeId] = true;
  u.effect(game);
  addMsg(`Upgrade purchased: ${u.name}`, 'event');
}

function chooseProject(projectId, choice) {
  const p = PROJECTS.find(x=>x.id===projectId);
  if (!p || game.projects[projectId] !== undefined) return;
  game.projects[projectId] = choice;
  const opt = choice === 'a' ? p.a : p.b;
  opt.effect(game);
  addMsg(`Brian chose: ${opt.name} - ${opt.desc}`, 'project');
}

function buyRealityProject(rpId) {
  const rp = REALITY_PROJECTS.find(x=>x.id===rpId);
  if (!rp || game.realityProjects[rpId]) return;
  if (rp.prereq && !game.realityProjects[rp.prereq]) return;
  if (rp.unlockFn && !rp.unlockFn(game)) return;
  if (game.brianEssence < rp.cost) return;
  game.brianEssence -= rp.cost;
  game.realityProjects[rpId] = true;
  rp.effect(game);
  addMsg(`Reality Project complete: ${rp.name}`, 'cosmic');
}

function buyMiniBrian() {
  if (!game.flags.miniBrians) return;
  if (game.brianEssence < 1000) return;
  game.brianEssence -= 1000;
  game.miniBrians++;
}

function convertToWisdom(resource) {
  const rates = { cp: 1000000, reputation: 100000, influence: 10000 };
  const rate = rates[resource] * game.wisdomCostMult;
  if (game[resource] < rate) return;
  game[resource] -= rate;
  const gained = 1 * game.wisdomGainMult;
  game.wisdom += gained;
  game.totalWisdom += gained;
}

// =========================================================================
// PHASE TRANSITIONS
// =========================================================================

const PHASE_NAMES = {
  1: 'Phase 1: Just Brian',
  2: 'Phase 2: Rising Brian',
  3: 'Phase 3: Brian Inc.',
  4: 'Phase 4: Brian Transcendent',
  5: 'Phase 5: Omnibrian'
};

const PHASE_SUBTITLES = {
  1: 'just a regular guy',
  2: 'becoming someone',
  3: 'building an empire',
  4: 'transcending reality',
  5: 'everything'
};

function checkPhaseTransitions() {
  if (game.phase === 1 && game.totalCp >= 100) {
    game.phase = 2;
    addMsg("Brian has become someone people want to be around. A new chapter begins.", 'event');
    updatePhaseUI();
  }
  if (game.phase === 2 && game.reputation >= 10000) {
    game.phase = 3;
    if (game.flags.startOpinion70) game.publicOpinion = 70;
    addMsg("Brian's influence can no longer be contained in a social circle. It's time to build something bigger.", 'event');
    updatePhaseUI();
  }
  if (game.phase === 3 && game.influence >= 1000000 && game.flags.protocolReady && !game.flags.transcendButtonShown) {
    game.flags.transcendButtonShown = true;
    addMsg("The Brian Protocol is ready. A button appears.", 'event');
  }
}

function initiateTranscendence() {
  if (game.phase !== 3) return;
  game.phase = 4;
  const lines = [
    "Brian presses the button.",
    "The machines whir to life.",
    "Reality... shimmers.",
    "Brian feels everything. Everyone. Every possibility.",
    "The numbers change. They become... more.",
    "Brian is no longer just Brian."
  ];
  let i = 0;
  const interval = setInterval(() => {
    if (i < lines.length) { addMsg(lines[i], 'cosmic'); i++; }
    else { clearInterval(interval); updatePhaseUI(); }
  }, 1000);
}

let _prevPhase = 0;

function updatePhaseUI() {
  const isNewPhase = _prevPhase !== 0 && _prevPhase !== game.phase;
  document.body.className = 'phase-' + game.phase;
  document.getElementById('phase-label').textContent = PHASE_NAMES[game.phase] || '';
  document.getElementById('phase-subtitle').textContent = PHASE_SUBTITLES[game.phase] || '';
  updateProgressBar();

  // Animate newly visible panels on phase transition
  if (isNewPhase) {
    setTimeout(() => {
      const panels = document.querySelectorAll(`[data-phase-min="${game.phase}"]`);
      panels.forEach(p => {
        p.classList.add('panel-new');
        // Add NEW badge to the h2 if it has one
        const h2 = p.querySelector('h2');
        if (h2 && !h2.querySelector('.new-badge')) {
          const badge = document.createElement('span');
          badge.className = 'new-badge';
          badge.textContent = 'NEW';
          h2.appendChild(badge);
          setTimeout(() => { if (badge.parentNode) badge.remove(); }, 4500);
        }
        p.addEventListener('animationend', () => p.classList.remove('panel-new'), { once: true });
      });
    }, 50);
  }
  _prevPhase = game.phase;
}

function updateProgressBar() {
  // Phase 1=0-20%, Phase 2=20-40%, Phase 3=40-60%, Phase 4=60-80%, Phase 5=80-100%
  let pct = 0;
  const phaseBase = (game.phase - 1) * 20;
  let phaseProgress = 0;

  if (game.phase === 1) {
    phaseProgress = Math.min(1, game.totalCp / 100);
  } else if (game.phase === 2) {
    phaseProgress = Math.min(1, game.reputation / 10000);
  } else if (game.phase === 3) {
    const needInf = game.influence >= 1000000 && game.flags.protocolReady;
    phaseProgress = needInf ? 1 : Math.min(0.95, game.influence / 1000000);
  } else if (game.phase === 4) {
    phaseProgress = Math.min(1, (game.brianEssence || 0) / 1000000);
  } else if (game.phase === 5) {
    phaseProgress = 1;
  }

  pct = phaseBase + phaseProgress * 20;
  document.getElementById('game-progress-fill').style.width = pct + '%';
}

// =========================================================================
// BOARD MEETINGS
// =========================================================================

let boardTimeout = null;

function triggerBoardMeeting() {
  if (game.phase < 3 || game.boardMeetingActive) return;
  game.boardTimer = 60 + Math.random() * 30;

  // Filter eligible meetings
  const eligible = BOARD_MEETINGS.filter(m => !m.unlockFn || m.unlockFn(game));
  if (eligible.length === 0) return;

  const meeting = eligible[Math.floor(Math.random() * eligible.length)];
  game.boardMeetingActive = true;
  game.stats.boardMeetings++;

  document.getElementById('board-situation').textContent = meeting.situation;
  document.getElementById('board-opt-a').innerHTML = `<b>${meeting.a.name}</b><br>${meeting.a.desc}`;
  document.getElementById('board-opt-b').innerHTML = `<b>${meeting.b.name}</b><br>${meeting.b.desc}`;

  const modal = document.getElementById('board-modal');
  modal.classList.remove('modal-hidden');

  let timeLeft = 30;
  document.getElementById('board-timer').textContent = `Auto-deciding in ${timeLeft}s...`;

  const resolve = (choice) => {
    clearTimeout(boardTimeout);
    clearInterval(countdownInterval);
    modal.classList.add('modal-hidden');
    game.boardMeetingActive = false;
    const opt = choice === 'a' ? meeting.a : meeting.b;
    opt.effect(game);
    clampOpinion();
    addMsg(`Board Meeting: ${meeting.situation} → ${opt.name}`, 'board');
  };

  document.getElementById('board-opt-a').onclick = () => resolve('a');
  document.getElementById('board-opt-b').onclick = () => resolve('b');

  const countdownInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('board-timer').textContent = `Auto-deciding in ${timeLeft}s...`;
    if (timeLeft <= 0) clearInterval(countdownInterval);
  }, 1000);

  boardTimeout = setTimeout(() => {
    resolve(Math.random() < 0.5 ? 'a' : 'b');
  }, 30000);
}

// =========================================================================
// ENDING
// =========================================================================

function triggerEnding() {
  game.phase = 5;
  updatePhaseUI();

  const overlay = document.getElementById('ending-overlay');
  const content = document.getElementById('ending-content');
  const choices = document.getElementById('ending-choices');
  overlay.classList.remove('modal-hidden');
  content.innerHTML = '';
  choices.innerHTML = '';

  const lines = [
    "Brian has consumed everything.",
    "There is nothing left but Brian.",
    "In the silence, Brian contemplates.",
    "What now?"
  ];

  lines.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = 'ending-line';
    el.textContent = line;
    content.appendChild(el);
    setTimeout(() => el.classList.add('visible'), (i + 1) * 2000);
  });

  setTimeout(() => {
    // Determine available endings
    if (game.flags.endingA || game.flags.humanity === true) {
      const btn = document.createElement('button');
      btn.textContent = 'The Compassionate Return';
      btn.onclick = () => showEnding('A');
      choices.appendChild(btn);
    }
    if (game.flags.endingB || game.flags.humanity === false) {
      const btn = document.createElement('button');
      btn.textContent = 'The Absolute Brian';
      btn.onclick = () => showEnding('B');
      choices.appendChild(btn);
    }
    if (game.flags.endingC || game.flags.alienContact) {
      const btn = document.createElement('button');
      btn.textContent = 'The Question';
      btn.onclick = () => showEnding('C');
      choices.appendChild(btn);
    }
    // Fallback: always have at least one ending
    if (choices.children.length === 0) {
      const btn = document.createElement('button');
      btn.textContent = 'The Absolute Brian';
      btn.onclick = () => showEnding('B');
      choices.appendChild(btn);
    }
  }, lines.length * 2000 + 1000);
}

function showEnding(ending) {
  const content = document.getElementById('ending-content');
  const choices = document.getElementById('ending-choices');
  content.innerHTML = '';
  choices.innerHTML = '';

  let lines = [];
  let prestigeMult = 2;

  if (ending === 'A') {
    lines = [
      "Brian releases everything back.",
      "The universe reforms, but better. Kinder. More Brian-like.",
      "People wake up feeling inexplicably good. They don't know why.",
      "Brian is just a person again. But the coffee tastes better now.",
      "",
      "THE COMPASSIONATE RETURN"
    ];
    prestigeMult = 2;
  } else if (ending === 'B') {
    lines = [
      "Brian becomes the universe.",
      "Every atom is Brian. Every thought is Brian.",
      "There is no distinction between Brian and everything else.",
      "B = mc\u00B2. B = E. B = everything. B = B.",
      "",
      "THE ABSOLUTE BRIAN"
    ];
    prestigeMult = 3;
  } else if (ending === 'C') {
    lines = [
      "Brian reaches out beyond the universe. Something reaches back.",
      "'Are you Brian too?' Brian asks.",
      "'No,' it replies. 'I'm something else entirely. But I've been watching.'",
      "'What happens now?' Brian asks.",
      "'We play again. But differently.'",
      "",
      "THE QUESTION"
    ];
    prestigeMult = 5;
  }

  lines.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = 'ending-line';
    el.textContent = line;
    el.style.fontSize = i === lines.length - 1 ? '24px' : '16px';
    content.appendChild(el);
    setTimeout(() => el.classList.add('visible'), (i + 1) * 2000);
  });

  // Stats
  setTimeout(() => {
    const statsEl = document.createElement('div');
    statsEl.style.cssText = 'margin-top:20px;font-size:13px;color:#888;line-height:2;';
    statsEl.innerHTML = `
      Total CP earned: ${fmt(game.totalCp)}<br>
      Total Reputation: ${fmt(game.totalReputation)}<br>
      Total Influence: ${fmt(game.totalInfluence)}<br>
      Total Wisdom: ${fmt(game.totalWisdom)}<br>
      Total Brian Essence: ${fmt(game.totalEssence)}<br>
      Friends made: ${fmt(totalFriends(game))}<br>
      Actions taken: ${fmt(game.stats.actions)}<br>
      Time played: ${fmtTime(game.stats.totalTimePlayed)}<br>
      Prestige runs: ${game.newBrianPlus}<br>
      <br>
      <b>New Brian+ prestige bonus: x${prestigeMult}</b>
    `;
    statsEl.className = 'ending-line';
    content.appendChild(statsEl);
    setTimeout(() => statsEl.classList.add('visible'), 500);

    // Prestige button
    const btn = document.createElement('button');
    btn.className = 'prestige-btn';
    btn.textContent = 'New Brian+';
    btn.onclick = () => prestigeReset(prestigeMult);
    choices.appendChild(btn);
  }, lines.length * 2000 + 2000);
}

function prestigeReset(mult) {
  const ngCount = game.newBrianPlus + 1;
  const newBonus = game.prestigeBonus * mult;
  game = getDefaultState();
  game.newBrianPlus = ngCount;
  game.prestigeBonus = newBonus;
  resetActionsToBase();

  // NG+ bonuses
  if (ngCount >= 1) game.cp = 50;
  if (ngCount >= 2) { game.phase = 2; game.totalCp = 100; game.reputation = 0; }
  if (ngCount >= 3) { game.globalCpMult *= 2; game.sectorCostMult *= 0.5; }

  document.getElementById('ending-overlay').classList.add('modal-hidden');
  updatePhaseUI();
  addMsg(`New Brian+ ${ngCount}. Prestige bonus: x${newBonus.toFixed(1)}. The legend begins anew.`, 'event');
  if (ngCount >= 5) addMsg("Brian has done this five times. Perhaps that's enough. Or perhaps... it never ends.", 'cosmic');
  saveGame();
}

function checkThoughts() {
  for (const t of THOUGHTS) {
    if (game.thoughtFlags[t.id]) continue;
    try {
      if (t.cond(game)) {
        game.thoughtFlags[t.id] = true;
        addMsg(t.text, t.type || 'thought');
      }
    } catch(e) {}
  }
}

function renderActions() {

// =========================================================================
// EMPLOYEE EFFECTS (tick-based)
// =========================================================================

let empTimers = { assistant: 0, social_director: 0 };

function tickEmployeeEffects(dt) {
  if (game.phase < 3 || game.flags.soloMode) return;
  const vpMult = game.employees.vp > 0 ? 2 : 1;
  const effMult = game.empEffectMult * vpMult;

  // Assistants: auto-click random phase 1 action
  const assistants = game.employees.assistant || 0;
  if (assistants > 0) {
    empTimers.assistant = (empTimers.assistant || 0) + dt;
    if (empTimers.assistant >= 2 / (assistants * effMult)) {
      empTimers.assistant = 0;
      const phase1Actions = ACTIONS.filter(a => a.phase === 1);
      const action = phase1Actions[Math.floor(Math.random() * phase1Actions.length)];
      const result = getActionCpGain(action);
      game.cp += result.cp;
      game.totalCp += result.cp;
    }
  }

  // PR Managers
  const prManagers = game.employees.pr_manager || 0;
  if (prManagers > 0 && !game.flags.opinionLocked) {
    game.publicOpinion += prManagers * 0.5 * effMult * dt * game.opinionGainMult;
    clampOpinion();
  }

  // Social Director: auto-buy cheapest friend
  const socialDirs = game.employees.social_director || 0;
  if (socialDirs > 0) {
    empTimers.social_director = (empTimers.social_director || 0) + dt;
    if (empTimers.social_director >= 10 / (socialDirs * effMult)) {
      empTimers.social_director = 0;
      let cheapest = null, cheapestCost = Infinity;
      for (const ft of FRIEND_TYPES) {
        const c = getFriendCost(ft.id);
        if (c < cheapestCost && game.cp >= c) { cheapest = ft.id; cheapestCost = c; }
      }
      if (cheapest) buyFriend(cheapest);
    }
  }

  // Sector managers: boost to production is passive (handled in getSectorCost reduction or prod mult)
  // Just a display note - sector manager effect is baked into sector calculations
}

// =========================================================================
// AUTO-ACTIONS
// =========================================================================

function tickAutoActions(dt) {
  for (const aa of game.autoActions) {
    aa.timer = (aa.timer || 0) + dt;
    if (aa.timer >= aa.interval) {
      aa.timer = 0;
      const action = findAction(aa.id);
      if (action) {
        const result = getActionCpGain(action);
        // Auto-actions don't cost energy
        game.cp += result.cp;
        game.totalCp += result.cp;
        if (result.rep > 0) {
          game.reputation += result.rep;
          game.totalReputation += result.rep;
        }
      }
    }
  }
}

// =========================================================================
// GAME LOOP
// =========================================================================

const TICK_MS = 100;
let lastTick = Date.now();
let uiCounter = 0;
let saveCounter = 0;

function gameTick() {
  const now = Date.now();
  const dt = Math.min((now - lastTick) / 1000, 1); // cap at 1s to prevent huge jumps
  lastTick = now;
  game.tick++;
  game.totalTicks++;
  game.stats.totalTimePlayed += dt;

  // Energy regen
  game.energy = Math.min(game.maxEnergy, game.energy + game.energyRegen * dt);

  // Phase 2+: passive CP from friends
  if (game.phase >= 2) {
    const cpGain = getCpPerSec() * dt;
    game.cp += cpGain;
    game.totalCp += cpGain;

    // Rep generation
    const repGain = getRepPerSec() * dt;
    game.reputation += repGain;
    game.totalReputation += repGain;
  }

  // Phase 3+
  if (game.phase >= 3) {
    const infGain = getInfPerSec() * dt;
    game.influence += infGain;
    game.totalInfluence += infGain;

    // Opinion drift
    if (!game.flags.opinionLocked) {
      let target = 50;
      if (game.flags.phil50) { game.publicOpinion = 80; }
      else {
        if (game.flags.phil25) target = 70;
        else if (game.flags.phil10) target = 60;
        if (game.flags.benevolent) game.publicOpinion += 0.2 * dt * game.opinionGainMult;
        if (game.flags.ruthless) game.publicOpinion -= 0.2 * dt * game.opinionLossMult;
        const drift = (target - game.publicOpinion) * 0.02 * game.opinionDriftMult * dt;
        game.publicOpinion += drift;
      }
      clampOpinion();
    }

    // Board meeting timer
    game.boardTimer -= dt;
    if (game.boardTimer <= 0 && !game.boardMeetingActive) {
      triggerBoardMeeting();
    }

    // Auto-convert flags
    if (game.flags.autoConvertCpRep && game.cp > 10000) {
      const convert = game.cp * 0.01 * dt;
      game.cp -= convert;
      game.reputation += convert * 0.1;
      game.totalReputation += convert * 0.1;
    }
    if (game.flags.autoConvertRepInf && game.reputation > 10000) {
      const convert = game.reputation * 0.01 * dt;
      game.reputation -= convert;
      game.influence += convert * 0.01;
      game.totalInfluence += convert * 0.01;
    }

    // Benevolent auto-level philanthropy
    if (game.flags.benevolent) {
      game._benevolentTimer = (game._benevolentTimer || 0) + dt;
      if (game._benevolentTimer >= 10) {
        game._benevolentTimer = 0;
        const cost = getSectorCost('philanthropy');
        if (game.influence >= cost) {
          game.influence -= cost;
          game.sectors.philanthropy++;
          checkSectorMilestones('philanthropy');
        }
      }
    }

    // Employee effects
    tickEmployeeEffects(dt);
  }

  // Phase 4+
  if (game.phase >= 4) {
    // Wisdom passive
    const wGain = getWisdomPerSec() * dt;
    game.wisdom += wGain;
    game.totalWisdom += wGain;

    // Brian Essence
    const eGain = getEssencePerSec() * dt;
    game.brianEssence += eGain;
    game.totalEssence += eGain;

    // Entropy decay
    if (game.flags.entropy) {
      game.cp *= (1 - 0.001 * dt);
      game.reputation *= (1 - 0.001 * dt);
      game.influence *= (1 - 0.001 * dt);
    }
  }

  // Auto-actions
  tickAutoActions(dt);

  // Check transitions & thoughts
  checkPhaseTransitions();
  if (game.tick % 5 === 0) checkThoughts();

  // UI update (throttled ~3x/sec)
  uiCounter += dt;
  if (uiCounter >= 0.33) {
    uiCounter = 0;
    updateUI();
  }

  // Auto-save every 30s
  saveCounter += dt;
  if (saveCounter >= 30) {
    saveCounter = 0;
    saveGame(true); // silent
  }
}

// =========================================================================
// SAVE / LOAD
// =========================================================================

function saveGame(silent) {
  game.lastSave = Date.now();
  game.lastOnline = Date.now();
  try {
    localStorage.setItem('brianSimulator', JSON.stringify(game));
    if (!silent) addMsg("Game saved.", 'system');
  } catch(e) {
    if (!silent) addMsg("Save failed: " + e.message, 'system');
  }
}

function loadGame() {
  try {
    const data = localStorage.getItem('brianSimulator');
    if (!data) return false;
    const loaded = JSON.parse(data);
    const defaults = getDefaultState();
    // Deep merge for nested objects
    for (const key of Object.keys(defaults)) {
      if (loaded[key] === undefined) loaded[key] = defaults[key];
      else if (typeof defaults[key] === 'object' && !Array.isArray(defaults[key]) && defaults[key] !== null) {
        loaded[key] = { ...defaults[key], ...loaded[key] };
      }
    }
    Object.assign(game, loaded);

    // Reset ACTIONS to base values, then re-apply upgrade effects on actions only.
    // Game state multipliers are already persisted correctly in the save data.
    reapplyUpgradeActionEffects();

    // Calculate offline progress
    const elapsed = (Date.now() - (game.lastOnline || Date.now())) / 1000;
    if (elapsed > 10) {
      const capped = Math.min(elapsed, 86400);
      const efficiency = game.flags.tech25 ? 1 : 0.5;
      const offCp = getCpPerSec() * capped * efficiency;
      const offRep = getRepPerSec() * capped * efficiency;
      const offInf = getInfPerSec() * capped * efficiency;
      game.cp += offCp;
      game.totalCp += offCp;
      game.reputation += offRep;
      game.totalReputation += offRep;
      game.influence += offInf;
      game.totalInfluence += offInf;
      if (game.phase >= 4) {
        const offW = getWisdomPerSec() * capped * efficiency;
        const offE = getEssencePerSec() * capped * efficiency;
        game.wisdom += offW;
        game.totalWisdom += offW;
        game.brianEssence += offE;
        game.totalEssence += offE;
      }
      addMsg(`Welcome back, Brian. While away for ${fmtTime(capped)}, you earned ${fmt(offCp)} CP${offRep>0?', '+fmt(offRep)+' Rep':''}${offInf>0?', '+fmt(offInf)+' Inf':''}.`, 'system');
    }

    updatePhaseUI();
    return true;
  } catch(e) {
    console.error('Load failed:', e);
    return false;
  }
}

function showExport() {
  const modal = document.getElementById('io-modal');
  document.getElementById('io-title').textContent = 'Export Save';
  document.getElementById('io-text').value = btoa(JSON.stringify(game));
  document.getElementById('io-action-btn').textContent = 'Copy';
  document.getElementById('io-action-btn').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('io-text').value);
    document.getElementById('io-action-btn').textContent = 'Copied!';
  };
  modal.classList.remove('modal-hidden');
}

function showImport() {
  const modal = document.getElementById('io-modal');
  document.getElementById('io-title').textContent = 'Import Save';
  document.getElementById('io-text').value = '';
  document.getElementById('io-action-btn').textContent = 'Import';
  document.getElementById('io-action-btn').onclick = () => {
    try {
      const data = JSON.parse(atob(document.getElementById('io-text').value));
      Object.assign(game, getDefaultState(), data);
      reapplyUpgradeActionEffects();
      updatePhaseUI();
      modal.classList.add('modal-hidden');
      addMsg("Save imported successfully.", 'system');
      saveGame(true);
    } catch(e) {
      alert('Invalid save data: ' + e.message);
    }
  };
  modal.classList.remove('modal-hidden');
}

function resetGame() {
  if (!confirm("Are you sure? This will erase ALL progress including prestige.")) return;
  if (!confirm("Really? Type your mind is made up?")) return;
  localStorage.removeItem('brianSimulator');
  game = getDefaultState();
  // Reset action base values
  location.reload();
}

// =========================================================================
// KEYBOARD SHORTCUTS
// =========================================================================

document.addEventListener('keydown', function(e) {
  // Ignore if typing in an input/textarea or modal is open
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (!document.getElementById('io-modal').classList.contains('modal-hidden')) return;
  if (!document.getElementById('board-modal').classList.contains('modal-hidden')) return;

  // Space: perform first available action
  if (e.code === 'Space') {
    e.preventDefault();
    for (const a of ACTIONS) {
      if (a.phase > game.phase) continue;
      if (game.totalCp < a.unlockTotalCp) continue;
      if (a.id === 'social_media' && !game.upgrades.p2_social1 && a.phase === 2) continue;
      const result = getActionCpGain(a);
      if (game.energy >= result.energy) {
        performAction(a.id);
        return;
      }
    }
    return;
  }

  // 1-4: buy friend types (in Phase 2+)
  if (game.phase >= 2 && e.key >= '1' && e.key <= '4') {
    const idx = parseInt(e.key) - 1;
    if (idx < FRIEND_TYPES.length) {
      buyFriend(FRIEND_TYPES[idx].id);
    }
    return;
  }

  // 5-9: buy upgrades (first 5 affordable/visible)
  if (e.key >= '5' && e.key <= '9') {
    const targetIdx = parseInt(e.key) - 5;
    let visIdx = 0;
    for (const u of UPGRADES) {
      if (u.phase > game.phase) continue;
      if (game.upgrades[u.id]) continue;
      try { if (!u.unlockFn(game)) continue; } catch(err) { continue; }
      const currency = u.currency === 'influence' ? game.influence : game.cp;
      if (currency >= u.cost) {
        if (visIdx === targetIdx) {
          buyUpgrade(u.id);
          return;
        }
        visIdx++;
      }
    }
    return;
  }
});

// =========================================================================
// INITIALIZATION
// =========================================================================

function init() {
  const loaded = loadGame();
  if (!loaded) {
    addMsg("Another day. Brian wakes up. There's coffee to make.", 'thought');
  }
  _prevPhase = game.phase; // Prevent animation on initial load
  updatePhaseUI();
  updateUI();
  renderMessages();
  setInterval(gameTick, TICK_MS);
}

init();
</script>
